# =============================================================================
# Nginx — reverse proxy + SSL termination untuk Gladi LMS
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ---- Dasar ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Upload materi kursus (PDF, gambar) — batasi 512MB; video lewat Cloudflare Stream
    client_max_body_size 512m;
    client_body_timeout   120s;

    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- Gzip (aset teks; brotli/gzip statis Next.js ditangani upstream) ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ---- Rate limiting zones ----
    # Login/register: cegah brute-force (5 req/menit per IP, burst 10)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # API umum: 30 req/detik per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_status 429;

    # ---- Resolver DNS internal Docker (127.0.0.11) ----
    # Dipakai bersama proxy_pass via variabel agar nginx TETAP BISA START
    # meskipun container "app" belum jalan (mis. saat bootstrap SSL di B6,
    # ketika hanya nginx yang di-up). Tanpa ini, upstream statis akan
    # gagal resolve → nginx crash-loop.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/*.conf;
}
